<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BookHeaven — Edit Book</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            color: #1a2332;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        /* ── Top nav bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }

        .topbar a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.88rem;
            font-weight: 500;
            color: #6366f1;
            text-decoration: none;
            transition: color 0.15s;
        }

        .topbar a:hover { color: #4f46e5; }

        .topbar a svg { width: 16px; height: 16px; }

        .topbar-sep {
            color: #d1d5db;
            font-size: 0.9rem;
        }

        .topbar-current {
            font-size: 0.88rem;
            color: #9ca3af;
        }

        /* ── Brand strip ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(99,102,241,0.25);
            flex-shrink: 0;
        }

        .brand-logo svg { width: 20px; height: 20px; fill: #fff; }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        /* ── Card ── */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 2.25rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 12px 40px rgba(99,102,241,0.08);
            border: 1px solid #e9edf2;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1.5px solid #f0f0f5;
        }

        .card-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: #ede9fe;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .card-icon svg { width: 20px; height: 20px; color: #7c3aed; }

        .card h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a2332;
        }

        .card h1 span {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            color: #9ca3af;
            margin-top: 1px;
        }

        /* ── Field groups ── */
        .field-group {
            margin-bottom: 1rem;
        }

        .field-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        .field-wrap {
            position: relative;
        }

        .field-wrap svg {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #9ca3af;
            pointer-events: none;
        }

        form input[type="text"],
        form input[type="hidden"] {
            width: 100%;
            padding: 0.7rem 0.9rem 0.7rem 2.5rem;
            font-size: 0.95rem;
            border: 1.5px solid #d1d5db;
            border-radius: 10px;
            background: #f9fafb;
            color: #1a2332;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            display: block;
        }

        form input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        form input::placeholder { color: #b0b7c3; }

        /* ── Actions ── */
        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.75rem;
        }

        button[type="submit"] {
            flex: 1;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 0.97rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(99,102,241,0.3);
        }

        button[type="submit"]:hover  { opacity: 0.91; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.38); }
        button[type="submit"]:active { opacity: 1; transform: translateY(0); }

        .cancel-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.25rem;
            border: 1.5px solid #d1d5db;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #6b7280;
            text-decoration: none;
            background: #fff;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .cancel-btn:hover { border-color: #a5b4fc; color: #4f46e5; background: #f5f3ff; }

        @media (max-width: 480px) {
            .card { padding: 1.5rem 1.25rem; }
            .form-actions { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 2h13a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v14h13V4H4zm2 2h9v2H6V6zm0 4h9v2H6v-2zm0 4h6v2H6v-2z"/>
            </svg>
        </div>
        <span class="brand-name">BookHeaven</span>
    </div>

    <!-- Breadcrumb -->
    <div class="topbar">
        <a th:href="@{/}" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Dashboard
        </a>
        <span class="topbar-sep">/</span>
        <span class="topbar-current">Edit Book</span>
    </div>

    <div class="card">

        <div class="card-header">
            <div class="card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            </div>
            <h1>
                Edit Book
                <span>Update the details below and save</span>
            </h1>
        </div>

        <form th:action="@{/update}" method="post" th:object="${book}">

            <input type="hidden" th:field="*{id}">

            <div class="field-group">
                <label class="field-label">Book Title</label>
                <div class="field-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    <input type="text" th:field="*{title}" placeholder="Enter book title" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Author</label>
                <div class="field-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" th:field="*{author}" placeholder="Enter author name" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Price</label>
                <div class="field-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    <input type="text" th:field="*{price}" placeholder="Enter price" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Image URL</label>
                <div class="field-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <input type="text" th:field="*{imageUrl}" placeholder="https://example.com/cover.jpg">
                </div>
            </div>

            <div class="form-actions">
                <a class="cancel-btn" th:href="@{/}" href="#">Cancel</a>
                <button type="submit">Update Book</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
