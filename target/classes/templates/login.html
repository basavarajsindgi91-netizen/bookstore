<!DOCTYPE html>
<html>
<head>
    <title>BookHeaven — Admin Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #fdf4ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* ── Brand header ── */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 16px;
            margin-bottom: 0.85rem;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }

        .brand-logo svg {
            width: 32px;
            height: 32px;
            fill: #fff;
        }

        .brand h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .brand p {
            font-size: 0.88rem;
            color: #9ca3af;
            margin-top: 0.3rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* ── Card ── */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 2.25rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 12px 40px rgba(99,102,241,0.08);
            border: 1px solid #e9edf2;
        }

        .card h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 1.75rem;
            text-align: center;
        }

        /* ── Form ── */
        .field {
            position: relative;
            margin-bottom: 1rem;
        }

        .field-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #9ca3af;
            pointer-events: none;
        }

        form input {
            width: 100%;
            padding: 0.7rem 0.9rem 0.7rem 2.6rem;
            font-size: 0.95rem;
            border: 1.5px solid #d1d5db;
            border-radius: 10px;
            background: #f9fafb;
            color: #1a2332;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            display: block;
        }

        form input:focus {
            outline: none;
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        form input::placeholder { color: #b0b7c3; }

        button[type="submit"] {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35);
        }

        button[type="submit"]:hover  {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        }

        button[type="submit"]:active { opacity: 1; transform: translateY(0); }

        /* ── Footer note ── */
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #b0b7c3;
        }

        @media (max-width: 480px) {
            .card { padding: 1.75rem 1.25rem; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="brand">
        <div class="brand-logo">
            <!-- Book icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 2h13a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v14h13V4H4zm2 2h9v2H6V6zm0 4h9v2H6v-2zm0 4h6v2H6v-2z"/>
            </svg>
        </div>
        <h1>BookHeaven</h1>
        <p>Admin Portal</p>
    </div>

    <div class="card">
        <h2>Sign in to your account</h2>

        <form action="/admin-login" method="post">

            <div class="field">
                <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="field">
                <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

    <p class="footer-note">&copy; 2025 BookHeaven. All rights reserved.</p>

</div>

</body>
</html>
